# Docker profile: run Spring Boot with MySQL container
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/fsrspring?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fsr_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fsr_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA for containerized runtime
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Keep seed data on first startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# H2 console not relevant for MySQL profile
spring.h2.console.enabled=false
