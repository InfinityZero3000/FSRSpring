<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Tra - VocabSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#6366f1', dark: '#4f46e5' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🧠</span>
                    <a href="/" class="text-xl font-bold text-indigo-700">VocabSmart</a>
                </div>
                <div class="hidden md:flex items-center gap-6">
                    <a href="/" class="text-gray-600 hover:text-indigo-700 transition-colors">Dashboard</a>
                    <a href="/vocabulary" class="text-gray-600 hover:text-indigo-700 transition-colors">Từ Vựng</a>
                    <a href="/learn" class="text-gray-600 hover:text-indigo-700 transition-colors">Học Bài</a>
                    <a href="/quiz" class="text-indigo-700 font-semibold border-b-2 border-indigo-700 pb-1">Kiểm Tra</a>
                    <a href="/progress" class="text-gray-600 hover:text-indigo-700 transition-colors">Tiến Độ</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Setup Screen -->
    <div id="setupScreen" class="max-w-xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-sm p-8 text-center">
            <div class="text-6xl mb-4">🧩</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Kiểm Tra Từ Vựng</h1>
            <p class="text-gray-500 mb-8">Trả lời câu hỏi trắc nghiệm để kiểm tra mức độ ghi nhớ của bạn</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 text-left">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Danh Mục</label>
                    <select id="qcategory" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                        <option value="">Tất Cả</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cấp Độ</label>
                    <select id="qdifficulty" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                        <option value="">Tất Cả</option>
                        <option value="BEGINNER">🟢 Sơ Cấp</option>
                        <option value="INTERMEDIATE">🟡 Trung Cấp</option>
                        <option value="ADVANCED">🔴 Nâng Cao</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Số Câu Hỏi</label>
                    <select id="qcount" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                        <option value="5">5 câu</option>
                        <option value="10" selected>10 câu</option>
                        <option value="15">15 câu</option>
                        <option value="20">20 câu</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Loại Câu Hỏi</label>
                    <select id="qtype" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                        <option value="en-vi">Chọn nghĩa tiếng Việt</option>
                        <option value="vi-en">Chọn từ tiếng Anh</option>
                    </select>
                </div>
            </div>
            <button onclick="startQuiz()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-full text-lg transition-all shadow-md hover:shadow-lg">
                <i class="fas fa-play mr-2"></i>Bắt Đầu Kiểm Tra
            </button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quizScreen" class="hidden max-w-2xl mx-auto px-4 py-8">
        <!-- Progress -->
        <div class="mb-6">
            <div class="flex justify-between text-sm text-gray-500 mb-2">
                <span id="quizProgress">Câu 1 / 10</span>
                <div class="flex gap-4">
                    <span class="text-green-600"><i class="fas fa-check mr-1"></i><span id="qCorrect">0</span></span>
                    <span class="text-red-500"><i class="fas fa-times mr-1"></i><span id="qIncorrect">0</span></span>
                </div>
            </div>
            <div class="bg-gray-200 rounded-full h-2">
                <div id="quizProgressBar" class="bg-indigo-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-6">
            <p class="text-sm text-gray-400 mb-3" id="quizInstruction">Chọn nghĩa đúng của từ sau:</p>
            <h2 id="questionWord" class="text-4xl font-bold text-gray-800 text-center mb-2"></h2>
            <p id="questionPronunciation" class="text-indigo-400 text-center mb-2"></p>
            <p id="questionCategory" class="text-gray-400 text-sm text-center"></p>
        </div>

        <!-- Options -->
        <div id="optionsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
        </div>

        <!-- Feedback -->
        <div id="feedback" class="hidden rounded-xl p-4 mb-4 text-center">
            <p id="feedbackText" class="font-semibold text-lg"></p>
            <p id="feedbackSubtext" class="text-sm mt-1"></p>
        </div>

        <!-- Next button -->
        <div class="text-center">
            <button id="nextBtn" onclick="nextQuestion()" class="hidden bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-full transition">
                Câu Tiếp Theo <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="hidden max-w-xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-sm p-8 text-center">
            <div id="resultEmoji" class="text-6xl mb-4"></div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Kết Quả Kiểm Tra</h2>
            <div id="scoreCircle" class="w-32 h-32 rounded-full border-8 flex items-center justify-center mx-auto my-6">
                <div>
                    <p id="scorePercent" class="text-3xl font-bold"></p>
                    <p class="text-xs text-gray-400">Điểm</p>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-indigo-50 rounded-xl p-3">
                    <p class="text-xl font-bold text-indigo-600" id="rTotal">0</p>
                    <p class="text-xs text-gray-500">Tổng câu</p>
                </div>
                <div class="bg-green-50 rounded-xl p-3">
                    <p class="text-xl font-bold text-green-600" id="rCorrect">0</p>
                    <p class="text-xs text-gray-500">Đúng</p>
                </div>
                <div class="bg-red-50 rounded-xl p-3">
                    <p class="text-xl font-bold text-red-500" id="rIncorrect">0</p>
                    <p class="text-xs text-gray-500">Sai</p>
                </div>
            </div>
            <p id="resultMessage" class="text-gray-500 mb-6"></p>
            <div class="flex gap-3">
                <button onclick="resetQuiz()" class="flex-1 border border-indigo-300 text-indigo-600 font-semibold py-2.5 rounded-xl hover:bg-indigo-50 transition">
                    <i class="fas fa-redo mr-1"></i>Làm Lại
                </button>
                <a href="/learn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition text-center">
                    <i class="fas fa-cards-blank mr-1"></i>Học Thêm
                </a>
            </div>
        </div>
    </div>

    <script src="/js/quiz.js"></script>
</body>
</html>
