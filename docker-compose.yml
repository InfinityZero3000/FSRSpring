services:
  mysql:
    image: mysql:8.4
    container_name: fsrspring-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: fsrspring
      MYSQL_USER: fsr_user
      MYSQL_PASSWORD: fsr_pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fsrspring-vocab:local
    container_name: fsrspring-vocab
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: -Xms128m -Xmx512m
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fsrspring?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: fsr_user
      SPRING_DATASOURCE_PASSWORD: fsr_pass
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
